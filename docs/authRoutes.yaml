tags:
  name: Authentication
  description: User login, registration, and session management


/api/auth/register:
  post:
    summary: Register a new user
    tags: [Authentication]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - email
              - password
            properties:
              username:
                type: string
              email:
                type: string
              password:
                type: string
    responses:
      201:
        description: User successfully registered
      400:
        description: Validation error or user already exists


/api/auth/login:
  post:
    summary: Log in an existing user
    tags: [Authentication]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - email
              - password
            properties:
              email:
                type: string
              password:
                type: string
    responses:
      200:
        description: Successfully logged in
      401:
        description: Invalid email or password


/api/auth/logout:
  post:
    summary: Log out the current user
    tags: [Authentication]
    security:
      - cookieAuth: []
    responses:
      200:
        description: Successfully logged out


/api/auth/profile:
  get:
    summary: Get user profile
    tags: [Authentication]
    security:
      - cookieAuth: []
    responses:
      200:
        description: User profile data
      401:
        description: Not authenticated
  put:
    summary: Update user profile
    tags: [Authentication]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              username:
                type: string
              email:
                type: string
              password:
                type: string
              avatarUrl:
                type: string
    responses:
      200:
        description: Profile updated
      401:
        description: Not authenticated


/api/auth/verify/{token}:
  get:
    summary: Verify email using a token
    tags: [Authentication]
    parameters:
      - in: path
        name: token
        required: true
        schema:
          type: string
        description: Verification token sent to email
    responses:
      200:
        description: Email verified successfully
      400:
        description: Invalid or expired token


/api/auth/google:
  get:
    summary: Initiate Google OAuth login
    tags: [Authentication]
    responses:
      302:
        description: Redirects to Google authentication page


/api/auth/github:
  get:
    summary: Initiate GitHub OAuth login
    tags: [Authentication]
    responses:
      302:
        description: Redirects to GitHub authentication page