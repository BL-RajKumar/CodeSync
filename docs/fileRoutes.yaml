tags:
  name: Files
  description: File and folder management


/api/files/{projectId}/search:
  get:
    summary: Search in project files
    tags: [Files]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: projectId
        required: true
        schema:
          type: string
      - in: query
        name: q
        required: true
        schema:
          type: string
        description: Search query
    responses:
      200:
        description: Search results


/api/files/{projectId}:
  get:
    summary: Get all files for a project
    tags: [Files]
    parameters:
      - in: path
        name: projectId
        required: true
        schema:
          type: string
    responses:
      200:
        description: List of files and folders


/api/files:
  post:
    summary: Create a file or folder
    tags: [Files]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              projectId:
                type: string
              name:
                type: string
              folderId:
                type: string
              isFolder:
                type: boolean
    responses:
      201:
        description: File or folder created


/api/files/folder/rename:
  put:
    summary: Rename a folder
    tags: [Files]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              projectId:
                type: string
              folderId:
                type: string
              newName:
                type: string
    responses:
      200:
        description: Folder renamed


/api/files/folder:
  delete:
    summary: Delete a folder
    tags: [Files]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              projectId:
                type: string
              folderId:
                type: string
    responses:
      200:
        description: Folder deleted


/api/files/{fileId}/rename:
  put:
    summary: Rename a file
    tags: [Files]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: fileId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              newName:
                type: string
    responses:
      200:
        description: File renamed


/api/files/{fileId}/content:
  put:
    summary: Update file content
    tags: [Files]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: fileId
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              content:
                type: string
    responses:
      200:
        description: File content updated


/api/files/{fileId}:
  delete:
    summary: Delete a file
    tags: [Files]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: fileId
        required: true
        schema:
          type: string
    responses:
      200:
        description: File deleted