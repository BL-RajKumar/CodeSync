tags:
  name: Snapshots
  description: File version control and snapshots


/api/snapshots:
  post:
    summary: Create a new snapshot
    tags: [Snapshots]
    security:
      - cookieAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              fileId:
                type: string
              content:
                type: string
              message:
                type: string
    responses:
      201:
        description: Snapshot created


/api/snapshots/file/{fileId}:
  get:
    summary: Get snapshots for a file
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: fileId
        required: true
        schema:
          type: string
    responses:
      200:
        description: List of snapshots


/api/snapshots/{id}:
  get:
    summary: Get a snapshot by ID
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    responses:
      200:
        description: Snapshot data


/api/snapshots/{id}/restore:
  post:
    summary: Restore a snapshot
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    responses:
      200:
        description: Snapshot restored


/api/snapshots/diff/{id1}/{id2}:
  get:
    summary: Compare two snapshots
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id1
        required: true
        schema:
          type: string
      - in: path
        name: id2
        required: true
        schema:
          type: string
    responses:
      200:
        description: Diff data


/api/snapshots/file/{fileId}/branches:
  get:
    summary: Get branches for a file
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: fileId
        required: true
        schema:
          type: string
    responses:
      200:
        description: List of branches


/api/snapshots/{id}/branch:
  post:
    summary: Create a branch from a snapshot
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              branchName:
                type: string
    responses:
      201:
        description: Branch created


/api/snapshots/{id}/tag:
  put:
    summary: Add a tag to a snapshot
    tags: [Snapshots]
    security:
      - cookieAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              tag:
                type: string
    responses:
      200:
        description: Tag added